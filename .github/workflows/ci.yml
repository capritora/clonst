name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # Hermetic suite: no LLM call, no quota. Also exercises the POSIX
      # process-group kill path on the Linux runners.
      - run: npm test
      - run: npm run smoke
      # Release guard: the npm package must contain dist/ only (no sources,
      # tests, probes or personal files).
      - run: node scripts/check-npm-pack.mjs
